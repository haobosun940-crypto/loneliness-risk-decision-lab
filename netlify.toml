[build]
  command = "python3 scripts/build_root_static_site.py"
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/outputs/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[redirects]]
  from = "/survey"
  to = "/survey/"
  status = 301

[[redirects]]
  from = "/dashboard"
  to = "/dashboard/"
  status = 301

[[redirects]]
  from = "/research"
  to = "/research/"
  status = 301

[[redirects]]
  from = "/evidence"
  to = "/evidence/"
  status = 301

[[redirects]]
  from = "/downloads"
  to = "/downloads/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
